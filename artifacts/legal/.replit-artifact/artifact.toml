kind = "web"
previewPath = "/legal/"
title = "GoalGetter Legal"
version = "1.0.0"
id = "artifacts/legal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/legal/" ]
localPort = 21934

[services.development]
run = "pnpm --filter @workspace/legal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legal", "run", "build" ]
publicDir = "artifacts/legal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21934"
BASE_PATH = "/legal/"
